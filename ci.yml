# GitHub Actions CI/CD Pipeline
# Team: Deadly Duo - Parks and National Parks Explorer
# Author: Anup Kharel (Scrum Leader & Developer)
# Branch: display-feature
#
# Automatically runs all tests on every push or pull request to main.

name: Parks Explorer CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest test_parks_explorer.py -v

      - name: Test Summary
        if: always()
        run: echo "All tests completed. Check logs above for results."
